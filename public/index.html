<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Markonix Real Estate</title>
<link rel="icon" type="image/png" href="./favi.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ─── LOADER ─────────────────────────────────── -->
<div id="markonix-preloader">
  <div class="structure-box">
    <div class="building-core">
      <div class="slab floor-1"></div>
      <div class="slab floor-2"></div>
      <div class="slab floor-3"></div>
      <div class="rod r1"></div>
      <div class="rod r2"></div>
      <div class="rod r3"></div>
      <div class="rod r4"></div>
    </div>
  </div>
  <div class="brand-footer">
    <h1 class="brand-title">MARKONIX <span>REAL ESTATE</span></h1>
    <div class="loading-line">
      <div class="loading-progress"></div>
    </div>
    <p class="loader-tagline">Constructing Your Property Solutions</p>
  </div>
</div>

<!-- ─── APP ───────────────────────────────────── -->
<div id="app">
  <div id="chat-container">

    <!-- HEADER -->
    <header id="header">
      <div class="header-left">
        <div class="logo-mark">
          <img src="./logoheader.png" alt="Markonix Logo" class="logo-img">
        </div>
        <div class="header-info">
          <h1>Markonix <span>Real Estate</span></h1>
          <p class="status"><span class="dot-live"></span>AI Consultant — Online</p>
        </div>
      </div>
      <button class="clear-btn" onclick="clearChat()" title="Clear conversation">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"></polyline>
          <path d="M3.51 15a9 9 0 1 0 .49-3.51"></path>
        </svg>
        <span>New Chat</span>
      </button>
    </header>

    <!-- MESSAGES -->
    <div id="messages">
      <div class="welcome-block">
        <div class="welcome-icon">
          <img src="./logoheader.png" alt="Markonix" class="welcome-logo">
        </div>
        <h2>Welcome to Markonix Real Estate</h2>
        <p>Pakistan's premium property consultancy — Karachi to Islamabad</p>
      </div>
    </div>

    <!-- TYPING -->
    <div id="typing-indicator">
      <div class="agent-avatar">
        <img src="./logoheader.png" alt="M" class="avatar-logo" onerror="this.style.display='none';this.parentNode.textContent='M'">
      </div>
      <div class="typing-bubble">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>
    </div>

    <!-- QUICK REPLIES -->
    <div id="quick-replies">
      <button class="qbtn" onclick="sendQuick('I am looking for a 2 bedroom apartment in Karachi, budget 1.5 crore')">🏢 Apartment Karachi</button>
      <button class="qbtn" onclick="sendQuick('What are current plot prices in DHA or Bahria Town?')">📊 Plot Prices</button>
      <button class="qbtn" onclick="sendQuick('What is the step by step process to buy property in Pakistan?')">📋 Buying Process</button>
      <button class="qbtn" onclick="sendQuick('Which property is best for rental income?')">💰 Rental Yield</button>
    </div>

    <!-- INPUT AREA -->
    <div id="input-area">
      <div id="input-row">
        <label for="img-upload" class="attach-btn" title="Attach property photo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <input type="file" id="img-upload" accept="image/*" style="display:none" onchange="handleImageSelect(this)">
        </label>
        <div id="input-wrapper">
          <div id="image-preview" class="hidden">
            <img id="preview-img" src="" alt="preview">
            <button onclick="clearImage()">✕</button>
          </div>
          <textarea id="user-input" rows="1" placeholder="Ask about properties..."></textarea>
        </div>
        <button id="send-btn" onclick="sendMessage()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">Enter ↵ send · Shift+Enter new line · Attach property photo for analysis</p>
    </div>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
